<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 382" font-family="system-ui, -apple-system, 'Segoe UI', sans-serif">
  <rect x="0.5" y="0.5" width="799" height="381" rx="10" fill="#fcfcfb" stroke="rgba(11,11,11,0.10)"/>

  <!-- Legend -->
  <circle cx="180" cy="26" r="5" fill="#52514e"/>
  <text x="192" y="30" font-size="12" fill="#52514e">Raw JSONL</text>
  <circle cx="289" cy="26" r="5" fill="#2a78d6"/>
  <text x="301" y="30" font-size="12" fill="#52514e">Agentic search</text>
  <circle cx="438" cy="26" r="5" fill="#1baf7a"/>
  <text x="450" y="30" font-size="12" fill="#52514e">Semantic + agentic search</text>

  <!-- Panel 1: duration -->
  <text x="20" y="50" font-size="13" font-weight="600" fill="#0b0b0b">Mean response time <tspan fill="#898781" font-weight="400">(seconds)</tspan></text>

  <!-- gridlines (non-zero ticks) -->
  <line x1="336.25" y1="66" x2="336.25" y2="180" stroke="#e1e0d9" stroke-width="1"/>
  <line x1="467.5" y1="66" x2="467.5" y2="180" stroke="#e1e0d9" stroke-width="1"/>
  <line x1="598.75" y1="66" x2="598.75" y2="180" stroke="#e1e0d9" stroke-width="1"/>
  <line x1="730" y1="66" x2="730" y2="180" stroke="#e1e0d9" stroke-width="1"/>
  <!-- baseline -->
  <line x1="205" y1="66" x2="205" y2="180" stroke="#c3c2b7" stroke-width="1"/>

  <!-- row: raw -->
  <circle cx="20" cy="85" r="4" fill="#52514e"/>
  <text x="32" y="89" font-size="12" fill="#52514e">Raw JSONL</text>
  <rect x="205" y="73" width="482.4" height="24" rx="4" fill="#52514e"/>
  <rect x="205" y="73" width="4" height="24" fill="#52514e"/>
  <text x="695.4" y="89" font-size="13" font-weight="600" fill="#0b0b0b">110.3s</text>

  <!-- row: indexed -->
  <circle cx="20" cy="123" r="4" fill="#2a78d6"/>
  <text x="32" y="127" font-size="12" fill="#52514e">Agentic search</text>
  <rect x="205" y="111" width="396.4" height="24" rx="4" fill="#2a78d6"/>
  <rect x="205" y="111" width="4" height="24" fill="#2a78d6"/>
  <text x="609.4" y="127" font-size="13" font-weight="600" fill="#0b0b0b">90.6s</text>

  <!-- row: search -->
  <circle cx="20" cy="161" r="4" fill="#1baf7a"/>
  <text x="32" y="165" font-size="12" fill="#52514e">Semantic + agentic search</text>
  <rect x="205" y="149" width="301.1" height="24" rx="4" fill="#1baf7a"/>
  <rect x="205" y="149" width="4" height="24" fill="#1baf7a"/>
  <text x="514.1" y="165" font-size="13" font-weight="600" fill="#0b0b0b">68.8s</text>

  <!-- tick labels -->
  <text x="205" y="194" font-size="10" fill="#898781" text-anchor="middle">0</text>
  <text x="336.25" y="194" font-size="10" fill="#898781" text-anchor="middle">30</text>
  <text x="467.5" y="194" font-size="10" fill="#898781" text-anchor="middle">60</text>
  <text x="598.75" y="194" font-size="10" fill="#898781" text-anchor="middle">90</text>
  <text x="730" y="194" font-size="10" fill="#898781" text-anchor="middle">120</text>

  <!-- Panel 2: tokens -->
  <text x="20" y="224" font-size="13" font-weight="600" fill="#0b0b0b">Mean input tokens</text>

  <line x1="355" y1="240" x2="355" y2="354" stroke="#e1e0d9" stroke-width="1"/>
  <line x1="505" y1="240" x2="505" y2="354" stroke="#e1e0d9" stroke-width="1"/>
  <line x1="655" y1="240" x2="655" y2="354" stroke="#e1e0d9" stroke-width="1"/>
  <line x1="205" y1="240" x2="205" y2="354" stroke="#c3c2b7" stroke-width="1"/>

  <!-- row: raw -->
  <circle cx="20" cy="259" r="4" fill="#52514e"/>
  <text x="32" y="263" font-size="12" fill="#52514e">Raw JSONL</text>
  <rect x="205" y="247" width="453.9" height="24" rx="4" fill="#52514e"/>
  <rect x="205" y="247" width="4" height="24" fill="#52514e"/>
  <text x="666.9" y="263" font-size="13" font-weight="600" fill="#0b0b0b">605.2K</text>

  <!-- row: indexed -->
  <circle cx="20" cy="297" r="4" fill="#2a78d6"/>
  <text x="32" y="301" font-size="12" fill="#52514e">Agentic search</text>
  <rect x="205" y="285" width="133.1" height="24" rx="4" fill="#2a78d6"/>
  <rect x="205" y="285" width="4" height="24" fill="#2a78d6"/>
  <text x="346.1" y="301" font-size="13" font-weight="600" fill="#0b0b0b">177.5K</text>

  <!-- row: search -->
  <circle cx="20" cy="335" r="4" fill="#1baf7a"/>
  <text x="32" y="339" font-size="12" fill="#52514e">Semantic + agentic search</text>
  <rect x="205" y="323" width="116.6" height="24" rx="4" fill="#1baf7a"/>
  <rect x="205" y="323" width="4" height="24" fill="#1baf7a"/>
  <text x="329.6" y="339" font-size="13" font-weight="600" fill="#0b0b0b">155.4K</text>

  <!-- tick labels -->
  <text x="205" y="368" font-size="10" fill="#898781" text-anchor="middle">0</text>
  <text x="355" y="368" font-size="10" fill="#898781" text-anchor="middle">200K</text>
  <text x="505" y="368" font-size="10" fill="#898781" text-anchor="middle">400K</text>
  <text x="655" y="368" font-size="10" fill="#898781" text-anchor="middle">600K</text>
</svg>
