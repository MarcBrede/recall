name: release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  release:
    runs-on: macos-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Build Apple Silicon binary
        run: |
          mkdir -p dist
          GOOS=darwin GOARCH=arm64 go build -o dist/recall ./cmd/recall
          tar -C dist -czf dist/recall_Darwin_arm64.tar.gz recall
          shasum -a 256 dist/recall_Darwin_arm64.tar.gz > dist/checksums.txt

      - name: Publish release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*
